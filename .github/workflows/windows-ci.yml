name: Windows CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.0"
          arch: "win64_mingw"
          modules: "qtmultimedia qtpdf qtshadertools"

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build-ci -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DELLA_RELEASE_VERSION=0.9.0-beta.ci
          -DELLA_RELEASE_CHANNEL=beta
          -DELLA_BUILD_ID=github-${{ github.run_id }}

      - name: Build
        shell: pwsh
        run: cmake --build build-ci --target appSecondBrain ellaMemoryBrowserTests --config ${{ matrix.build_type }} -j 4

      - name: Run tests
        shell: pwsh
        run: ctest --test-dir build-ci --output-on-failure -C ${{ matrix.build_type }}
