name: Windows CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  QT_VERSION: "6.10.0"

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize PATH for Python on Windows
        shell: pwsh
        run: |
          $pathParts = $env:PATH -split ';' | Where-Object {
            $_ -and ($_ -notlike '*\AppData\Local\Microsoft\WindowsApps*')
          }
          "PATH=$($pathParts -join ';')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: "win64_mingw"
          modules: "qtmultimedia qtpdf qtshadertools"

      - name: Use Qt bundled MinGW toolchain
        shell: pwsh
        run: |
          $qtBases = @()
          if ($env:Qt6_DIR -and (Test-Path $env:Qt6_DIR)) {
            $qtBases += (Resolve-Path (Join-Path $env:Qt6_DIR "..\..\..\..\..")).Path
          }
          if ($env:RUNNER_WORKSPACE) {
            $qtBases += (Join-Path $env:RUNNER_WORKSPACE "Qt")
          }
          if ($env:GITHUB_WORKSPACE) {
            $qtBases += (Join-Path $env:GITHUB_WORKSPACE "Qt")
            try {
              $qtBases += (Resolve-Path (Join-Path $env:GITHUB_WORKSPACE "..\Qt") -ErrorAction Stop).Path
            } catch {
            }
          }

          $qtBases = @($qtBases | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique)
          if ($qtBases.Count -eq 0) {
            throw "Could not locate Qt base directory. Checked Qt6_DIR, RUNNER_WORKSPACE\\Qt and GITHUB_WORKSPACE\\..\\Qt"
          }

          $qtMingwDir = $null
          foreach ($base in $qtBases) {
            $versionDirs = Get-ChildItem -Path $base -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '^\d+\.\d+\.\d+$' } |
              Sort-Object Name -Descending
            foreach ($ver in $versionDirs) {
              $candidate = Join-Path $ver.FullName "mingw_64"
              $qtConfig = Join-Path $candidate "lib\cmake\Qt6\Qt6Config.cmake"
              if (Test-Path $qtConfig) {
                $qtMingwDir = $candidate
                break
              }
            }
            if ($qtMingwDir) {
              break
            }
          }

          if (-not $qtMingwDir) {
            throw ("Qt mingw_64 directory not found under: " + ($qtBases -join ", "))
          }

          $qtRoot = (Resolve-Path (Join-Path $qtMingwDir "..\..")).Path
          $toolsDir = Join-Path $qtRoot "Tools"
          if (-not (Test-Path $toolsDir)) {
            throw "Qt Tools directory not found: $toolsDir"
          }

          $mingwDir = Get-ChildItem -Path $toolsDir -Directory |
            Where-Object { $_.Name -like "mingw*_64" } |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if (-not $mingwDir) {
            throw "No Qt MinGW toolchain found under $toolsDir"
          }

          $mingwBin = Join-Path $mingwDir.FullName "bin"
          if (-not (Test-Path (Join-Path $mingwBin "g++.exe"))) {
            throw "g++.exe not found in $mingwBin"
          }

          "PATH=$mingwBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CC=$mingwBin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=$mingwBin\g++.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MINGW_MAKE=$mingwBin\mingw32-make.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "QT6_CMAKE_DIR=$qtMingwDir\lib\cmake\Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify compiler selection
        shell: pwsh
        run: |
          Write-Host "CC=$env:CC"
          Write-Host "CXX=$env:CXX"
          Write-Host "MINGW_MAKE=$env:MINGW_MAKE"
          Write-Host "QT6_CMAKE_DIR=$env:QT6_CMAKE_DIR"
          where.exe gcc
          where.exe g++
          & $env:CXX --version

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build-ci -G "MinGW Makefiles"
          -DCMAKE_C_COMPILER:FILEPATH=${{ env.CC }}
          -DCMAKE_CXX_COMPILER:FILEPATH=${{ env.CXX }}
          -DCMAKE_MAKE_PROGRAM:FILEPATH=${{ env.MINGW_MAKE }}
          -DQt6_DIR:PATH=${{ env.QT6_CMAKE_DIR }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DELLA_RELEASE_VERSION=0.9.0-beta.ci
          -DELLA_RELEASE_CHANNEL=beta
          -DELLA_BUILD_ID=github-${{ github.run_id }}

      - name: Build
        shell: pwsh
        run: cmake --build build-ci --target appSecondBrain ellaMemoryBrowserTests --config ${{ matrix.build_type }} -j 4

      - name: Run tests
        shell: pwsh
        run: ctest --test-dir build-ci --output-on-failure -C ${{ matrix.build_type }}
